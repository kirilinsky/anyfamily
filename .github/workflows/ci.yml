name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm --dir packages/anyfamily install --frozen-lockfile
      - run: pnpm --dir packages/anyfamily test

      - run: pnpm --dir packages/anyfamily-react install --frozen-lockfile
      - run: pnpm --dir packages/anyfamily-react test
